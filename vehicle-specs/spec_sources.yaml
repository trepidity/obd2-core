# ==============================================================================
# MASTER SOURCE REFERENCE: OBD-II Vehicle Specification Data
# ==============================================================================
#
# Purpose: Authoritative, citable sources for building vehicle diagnostic specs.
#          Every PID, DTC, formula, threshold, and protocol detail in a vehicle
#          spec MUST be traceable to one or more entries in this file.
#
# Usage:
#   - When creating a new vehicle spec, tag each section with a "sources:" key
#     listing the source IDs from this file (e.g. sources: [SAE-J1979, GM-ACDELCO-TDS])
#   - Confidence levels:
#       verified    = confirmed against manufacturer tool or standards document
#       community   = multiple independent confirmations from diagnostic community
#       inferred    = extrapolated from related platform data, needs verification
#       unverified  = from training data or single source, treat as provisional
#
# Organization:
#   1. Standards Bodies (SAE, ISO) — universal OBD-II definitions
#   2. Manufacturer Service Information — OEM factory data
#   3. Manufacturer Diagnostic Tools — software that defines PID/DTC sets
#   4. Aftermarket Diagnostic Tools — third-party tools with verified PID databases
#   5. Community-Verified Technical References — forum/blog data cross-checked
#   6. Protocol & Hardware References — physical layer and adapter documentation
#   7. Academic & Technical Papers — peer-reviewed or manufacturer whitepapers
#
# ==============================================================================


# ──────────────────────────────────────────────────────────────────────────────
# 1. STANDARDS BODIES (SAE / ISO)
# ──────────────────────────────────────────────────────────────────────────────
#
# These define the universal OBD-II framework: standard PIDs, DTC format,
# protocol layers, and connector pinouts. Applicable to ALL OBD-II vehicles.
# ──────────────────────────────────────────────────────────────────────────────

standards:

  - id: SAE-J1979
    name: "SAE J1979 — E/E Diagnostic Test Modes"
    iso_equivalent: "ISO 15031-5"
    scope: "Defines all 10 standard OBD-II service modes (Mode 01-0A), PID definitions, formulas, units, and byte layouts"
    covers:
      - "Mode 01: Current powertrain data (standard PIDs 0x00-0x7F)"
      - "Mode 02: Freeze frame data"
      - "Mode 03: Stored DTCs"
      - "Mode 04: Clear DTCs"
      - "Mode 05: O2 sensor monitoring (gasoline only)"
      - "Mode 06: On-board monitoring test results"
      - "Mode 07: Pending DTCs"
      - "Mode 08: Control of on-board systems"
      - "Mode 09: Vehicle information (VIN, CALIDs, CVNs)"
      - "Mode 0A: Permanent DTCs"
    purchase_url: "https://www.sae.org/standards/content/j1979_201702/"
    alt_purchase_url: "https://webstore.ansi.org/standards/sae/sae19792012j1979"
    free_archive_url: "https://archive.org/details/gov.law.sae.j1979.2002"
    note: "The 2002 version on archive.org covers the core PID set. Later revisions add new PIDs but formulas for existing PIDs are stable."
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J1979-DA
    name: "SAE J1979-DA — Digital Annex (PID Registry)"
    scope: "Machine-readable spreadsheet of all registered PIDs, OBDMIDs, TIDs, and INFOTYPEs with formulas and units"
    purchase_url: "https://www.sae.org/standards/content/j1979da_202404/"
    note: "This is the definitive source for PID formulas. Updated more frequently than J1979 itself."
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J2012
    name: "SAE J2012 — Diagnostic Trouble Code Definitions"
    iso_equivalent: "ISO 15031-6"
    scope: "DTC 2-byte encoding format, 5-character structure (Pxxxx/Cxxxx/Bxxxx/Uxxxx), and standardized definitions for generic DTCs"
    covers:
      - "DTC byte decoding (bits 15-14 = category, bits 13-12 = second char, etc.)"
      - "Generic/universal DTC definitions (P0xxx where first digit is 0)"
      - "Manufacturer-specific DTC ranges (P1xxx, P2xxx upper, P3xxx)"
    purchase_url: "https://www.sae.org/standards/content/j2012_201612/"
    free_archive_url: "https://law.resource.org/pub/us/cfr/ibr/005/sae.j2012.2002.pdf"
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J2012-DA
    name: "SAE J2012-DA — Digital Annex (DTC Registry)"
    scope: "Machine-readable spreadsheet of all registered DTC definitions"
    purchase_url: "https://www.sae.org/standards/content/j2012da_202404/"
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J1850
    name: "SAE J1850 — Class B Data Communications Network Interface"
    scope: "Physical and data link layer for J1850 VPW (Variable Pulse Width) and J1850 PWM (Pulse Width Modulation) protocols"
    covers:
      - "VPW variant: single-wire, 10.4 kbps, OBD-II pin 2 (GM vehicles 1996-2007)"
      - "PWM variant: dual-wire, 41.6 kbps, OBD-II pins 2+10 (Ford vehicles 1996-2007)"
      - "Message format: priority byte, target, source, data (up to 8 bytes), CRC-8"
      - "Timing parameters (P1-P4, inter-byte, response windows)"
      - "Voltage levels: VPW high=7.75V, low=3.25V"
    purchase_url: "https://www.sae.org/standards/content/j1850_202212/"
    alt_purchase_url: "https://webstore.ansi.org/standards/sae/sae18502015j1850"
    free_archive_url: "https://law.resource.org/pub/us/cfr/ibr/005/sae.j1850.2001.pdf"
    confidence: verified
    applies_to: "gm_pre_2008, ford_pre_2008, chrysler_pre_2008"

  - id: SAE-J2190
    name: "SAE J2190 — Enhanced E/E Diagnostic Test Modes"
    scope: "Manufacturer-specific enhanced diagnostic modes including Mode $22 (Read Data By Identifier)"
    covers:
      - "Mode $22: Read Data By PID (enhanced/manufacturer-specific PIDs)"
      - "Mode $2F: Input/Output Control By Identifier (actuator tests)"
      - "Mode $27: Security Access"
      - "Mode $10: Diagnostic Session Control"
      - "Mode $3E: Tester Present"
      - "Mode $14: Enhanced Clear DTCs"
      - "Mode $19: Enhanced Read DTC Information"
    purchase_url: "https://www.sae.org/standards/content/j2190_200810/"
    alt_url: "https://saemobilus.sae.org/standards/j2190_200810-enhanced-e-e-diagnostic-test-modes"
    note: "Defines the service framework, NOT the manufacturer-specific PID addresses. Actual PIDs come from OEM documentation."
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J1962
    name: "SAE J1962 — Diagnostic Connector"
    iso_equivalent: "ISO 15031-3"
    scope: "Standard 16-pin DLC (Data Link Connector) pin assignments"
    covers:
      - "Pin 2: J1850 VPW data (SAE J1850)"
      - "Pin 4: Chassis ground"
      - "Pin 5: Signal ground"
      - "Pin 6: CAN high (ISO 15765)"
      - "Pin 7: K-line (ISO 9141-2)"
      - "Pin 10: J1850 PWM negative (SAE J1850)"
      - "Pin 14: CAN low (ISO 15765)"
      - "Pin 15: L-line (ISO 9141-2)"
      - "Pin 16: Battery positive (+12V)"
    purchase_url: "https://saemobilus.sae.org/standards/j1962_201607-diagnostic-connector"
    iso_url: "https://www.iso.org/standard/64636.html"
    confidence: verified
    applies_to: "all_obd2_vehicles"

  - id: SAE-J2284
    name: "SAE J2284 — High Speed CAN for Vehicle Applications"
    iso_equivalent: "ISO 11898"
    scope: "CAN bus physical and data link layer for OBD-II diagnostics (2008+ GM, 2008+ Ford, 2008+ Chrysler)"
    note: "Not used by LLY Duramax on the OBD-II DLC, but used internally for ECM-TCM communication."
    confidence: verified
    applies_to: "can_bus_vehicles"

  - id: ISO-14229
    name: "ISO 14229 — Unified Diagnostic Services (UDS)"
    scope: "Modern diagnostic protocol used by CAN-based vehicles (2008+). Supersedes J2190 for newer platforms."
    covers:
      - "Service 0x22: Read Data By Identifier"
      - "Service 0x2E: Write Data By Identifier"
      - "Service 0x2F: Input/Output Control By Identifier"
      - "Service 0x19: Read DTC Information (with sub-functions)"
      - "Service 0x14: Clear Diagnostic Information"
      - "Service 0x27: Security Access"
      - "Service 0x10: Diagnostic Session Control"
      - "Service 0x3E: Tester Present"
    purchase_url: "https://www.iso.org/standard/72439.html"
    note: "Pre-CAN GM vehicles (J1850) use a proprietary variant of these services, not full UDS. The service IDs are similar but message framing differs."
    confidence: verified
    applies_to: "can_bus_vehicles"

  - id: SAE-J1939
    name: "SAE J1939 — Serial Control and Communications Heavy Duty Vehicle Network"
    scope: "CAN-based protocol for heavy-duty vehicles, trucks, and diesel engines"
    covers:
      - "PGN (Parameter Group Number) definitions"
      - "SPN (Suspect Parameter Number) definitions"
      - "DM messages (Diagnostic Messages 1-14)"
      - "Torque/speed communication between ECM and TCM"
    note: "The LLY Duramax uses J1939 internally between ECM and TCM for torque management, but this is not directly accessible via the OBD-II DLC."
    confidence: verified
    applies_to: "heavy_duty_diesel, medium_duty_diesel"


