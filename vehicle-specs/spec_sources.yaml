# ──────────────────────────────────────────────────────────────────────────────
# 8. CROSS-REFERENCE: WHICH SOURCES TO USE PER DATA TYPE
# ──────────────────────────────────────────────────────────────────────────────

source_selection_guide:
  description: "When building a new vehicle spec, use this guide to identify which sources to consult for each type of data."

  standard_obd2_pids:
    primary: [SAE-J1979, SAE-J1979-DA]
    secondary: [CSS-ELECTRONICS]
    note: "Standard PIDs (Mode 01) are universally defined. Formulas do not vary by manufacturer."

  enhanced_pids_mode_22:
    primary: "Manufacturer service information (e.g. GM-ACDELCO-TDS, FORD-MOTORCRAFT)"
    secondary: "Manufacturer scan tool PID database (e.g. GM-TECH2, GM-MDI)"
    tertiary: "Aftermarket tuning tools (e.g. EFILIVE, HP-TUNERS, DIABLOSPORT-TRINITY)"
    community: "Forum threads with Tech2/MDI comparison data"
    warning: "Enhanced PIDs are manufacturer-specific and vary by ECM calibration. NEVER assume a PID address is correct without verification against at least 2 independent sources."

  dtc_definitions:
    generic: [SAE-J2012, SAE-J2012-DA]
    manufacturer_specific: "Manufacturer service information"
    note: "P0xxx codes (first digit 0) are standardized by SAE J2012. P1xxx, P2xxx (upper range), and P3xxx codes are manufacturer-specific."

  communication_protocol:
    standard: [SAE-J1850, SAE-J2284, SAE-J1962]
    implementation: [NXP-AN1731, INTEL-J1850-PAPER]
    note: "Protocol selection depends on vehicle year and manufacturer. Check DLC pin presence to identify protocol."

  transmission_pids:
    allison: [ALLISON-DOC, ALLISON-TS3977EN, ALLISON-HUB]
    note: "Allison TCM PIDs are only officially documented through Allison DOC software. Community sources provide partial coverage."

  thresholds_and_ranges:
    primary: "Manufacturer service information (specifications section)"
    secondary: "Engine family data (displacement, compression ratio, redline derive expected ranges)"
    note: "Threshold values should come from OEM specs whenever possible. Community-derived ranges are useful but may not account for altitude, ambient temp, or vehicle-specific calibration differences."


