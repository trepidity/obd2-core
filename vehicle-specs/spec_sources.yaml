    verified_data:
      pids:
        cyl_1: { mode_22_did: "16 2F", formula: "((A*256+B)-32768)/64", unit: "mm3" }
        cyl_2: { mode_22_did: "16 30", formula: "((A*256+B)-32768)/64", unit: "mm3" }
        cyl_3: { mode_22_did: "16 31", formula: "((A*256+B)-32768)/64", unit: "mm3" }
        cyl_4: { mode_22_did: "16 32", formula: "((A*256+B)-32768)/64", unit: "mm3" }
