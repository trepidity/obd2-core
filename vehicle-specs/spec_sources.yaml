        cyl_6: { mode_22_did: "16 34", formula: "((A*256+B)-32768)/64", unit: "mm3" }
        cyl_7: { mode_22_did: "16 35", formula: "((A*256+B)-32768)/64", unit: "mm3" }
        cyl_8: { mode_22_did: "16 36", formula: "((A*256+B)-32768)/64", unit: "mm3" }
      header: "6C 10 F1"
      elm327_command_example: "22 16 2F 01"
      command_note: "Trailing 01 = data rate byte, required on J1850 VPW"
      normal_ranges:
        park_neutral: "+/- 4.0 mm3"
        in_gear_idle: "+/- 6.0 mm3"
