    - { id: "U0100", meaning: "Lost Communication with ECM/PCM", severity: "critical" }
    - { id: "U0101", meaning: "Lost Communication with TCM", severity: "critical" }
    - { id: "U0103", meaning: "Lost Communication with Gear Shift Module", severity: "medium" }
    - { id: "U0121", meaning: "Lost Communication with ABS Module", severity: "high" }
    - { id: "U0140", meaning: "Lost Communication with BCM", severity: "high" }
    - { id: "U0151", meaning: "Lost Communication with SIR Module", severity: "high" }
    - { id: "U0155", meaning: "Lost Communication with IPC", severity: "medium" }
    - { id: "U0168", meaning: "Lost Communication with VCIM (OnStar)", severity: "low" }
    - { id: "U0184", meaning: "Lost Communication with Radio", severity: "low" }

# ──────────────────────────────────────────────────────────────────────────────
# 17. DTC DECODING FORMAT
# ──────────────────────────────────────────────────────────────────────────────

dtc_decoding:
  description: "How to decode the 2-byte DTC value from Mode 03/07/0A responses"
  format:
    byte_1_bits_7_6:
      "00": "P (Powertrain)"
      "01": "C (Chassis)"
      "10": "B (Body)"
      "11": "U (Network)"
    byte_1_bits_5_4: "Second character (0-3)"
    byte_1_bits_3_0: "Third character (0-F hex)"
    byte_2_bits_7_4: "Fourth character (0-F hex)"
    byte_2_bits_3_0: "Fifth character (0-F hex)"
  example:
    raw_bytes: "01 33"
    binary: "00000001 00110011"
    decoded: "P0133"
    meaning: "O2 Sensor Circuit Slow Response (Bank 1, Sensor 1)"

# ──────────────────────────────────────────────────────────────────────────────
# 18. READINESS MONITOR STATUS (Diesel-Specific)
# ──────────────────────────────────────────────────────────────────────────────

readiness_monitors:
  description: "OBD-II readiness monitors for diesel/compression ignition. Mode 01 PID 01."
  monitors:
    continuous:
      - { name: "Misfire", bit: "B0.0", note: "Always runs when engine is on" }
      - { name: "Fuel System", bit: "B0.1", note: "Monitors rail pressure regulation" }
      - { name: "Components", bit: "B0.2", note: "Sensor rationality checks" }
    non_continuous:
      - { name: "EGR/VVT System", bit: "B2.0", drive_cycle: "Requires highway + idle transitions" }
      - { name: "Boost Pressure", bit: "B2.1", drive_cycle: "Requires moderate acceleration under load" }
      - { name: "Exhaust Gas Sensor", bit: "B2.2", note: "N/A on LLY (no NOx sensor)" }
      - { name: "PM Filter", bit: "B2.3", note: "N/A on LLY (no DPF)" }
  drive_cycle:
    description: "Minimum drive cycle to set all LLY readiness monitors"
    steps:
      - "Cold start (coolant < 50°C, ideally < 30°C)"
      - "Idle for 2 minutes (glow plugs, component checks)"
      - "Steady cruise at 50-70 km/h for 5 minutes (fuel system, boost)"
      - "3-4 moderate accelerations from 30 to 90 km/h (EGR, boost monitor)"
      - "Highway cruise at 100 km/h for 5 minutes"
      - "Deceleration (foot off throttle) to 40 km/h, 3 times"
      - "Idle for 30 seconds"
      - "Total: ~20-30 minutes minimum"

# ──────────────────────────────────────────────────────────────────────────────
# 19. PID POLLING GROUPS (Recommended scan sequences)
# ──────────────────────────────────────────────────────────────────────────────

polling_groups:
  description: "Recommended PID groups for different diagnostic scenarios. Polling fewer PIDs = faster update rate."

  dashboard_essentials:
    description: "Minimum PIDs for a real-time dashboard display"
    header: "68 6A F1"
    poll_rate_target_ms: 200
    pids:
      - { service: "01", pid: "0C", name: "Engine RPM" }
      - { service: "01", pid: "0D", name: "Vehicle Speed" }
      - { service: "01", pid: "05", name: "Coolant Temp" }
      - { service: "01", pid: "0B", name: "MAP (Boost)" }
      - { service: "01", pid: "04", name: "Engine Load" }
      - { service: "01", pid: "5E", name: "Fuel Rate" }

  engine_health:
    description: "Full engine health assessment"
    steps:
      - header: "68 6A F1"
        pids:
          - { service: "01", pid: "0C", name: "RPM" }
          - { service: "01", pid: "05", name: "Coolant Temp" }
          - { service: "01", pid: "5C", name: "Oil Temp" }
          - { service: "01", pid: "42", name: "Battery Voltage" }
          - { service: "01", pid: "0B", name: "MAP" }
          - { service: "01", pid: "10", name: "MAF" }
          - { service: "01", pid: "2C", name: "Commanded EGR" }
      - header: "6C 10 F1"
        pids:
          - { service: "22", pid: "11 70", name: "Fuel Rail Pressure Actual" }
          - { service: "22", pid: "11 71", name: "Fuel Rail Pressure Desired" }
          - { service: "22", pid: "11 74", name: "Fuel Temperature" }
          - { service: "22", pid: "11 50", name: "Oil Pressure" }
          - { service: "22", pid: "11 9B", name: "VGT Position Actual" }
          - { service: "22", pid: "11 91", name: "VGT Position Desired" }
          - { service: "22", pid: "11 16", name: "Boost Pressure Actual" }
          - { service: "22", pid: "19 86-8D", name: "Injector Balance Rates (all 8)" }

  transmission_health:
    description: "Allison 1000 health assessment"
    header: "6C 18 F1"
    pids:
      - { service: "22", pid: "19 40", name: "TFT" }
      - { service: "22", pid: "19 41", name: "Turbine Speed" }
      - { service: "22", pid: "19 42", name: "Output Speed" }
      - { service: "22", pid: "19 43", name: "TCC Slip" }
      - { service: "22", pid: "19 48", name: "Current Gear" }
      - { service: "22", pid: "19 4A", name: "Gear Ratio" }
      - { service: "22", pid: "19 50", name: "Line Pressure Actual" }
      - { service: "22", pid: "19 62", name: "TCC Duty Cycle" }
      - { service: "22", pid: "19 46-55", name: "Clutch Volume Indices (C1-C5)" }
      - { service: "22", pid: "19 91", name: "Solenoid State" }

  turbo_diagnostics:
    description: "VGT turbo health check — for diagnosing the #1 LLY failure"
    header: "6C 10 F1"
    pids:
      - { service: "22", pid: "11 9B", name: "VGT Position Actual" }
      - { service: "22", pid: "11 91", name: "VGT Position Desired" }
      - { service: "22", pid: "11 9C", name: "VGT Position Error" }
      - { service: "22", pid: "11 15", name: "VGT Duty Cycle" }
      - { service: "22", pid: "11 16", name: "Boost Pressure Actual" }
      - { service: "22", pid: "11 17", name: "Boost Pressure Desired" }
      - { service: "22", pid: "11 19", name: "Charge Air Cooler Outlet Temp" }
    diagnostic_procedure:
      - "Engine warm (coolant > 80°C), idle in Park"
      - "Monitor VGT Position Error — should be < ±5% at idle"
      - "Rev to 2000 RPM and hold 5 seconds"
      - "VGT should move from ~50% to ~20% smoothly"
      - "Error spike > 15% during transition = vane sticking"
      - "If vanes stick, check for soot in unison ring (requires turbo removal)"

  full_dtc_scan:
    description: "Complete DTC retrieval from all modules"
    sequence:
      - { step: 1, header: "68 6A F1", request: "03", target: "All modules (broadcast) — stored DTCs" }
      - { step: 2, header: "68 6A F1", request: "07", target: "All modules (broadcast) — pending DTCs" }
      - { step: 3, header: "68 6A F1", request: "0A", target: "All modules (broadcast) — permanent DTCs" }
      - { step: 4, header: "6C 10 F1", request: "03", target: "ECM only — engine DTCs" }
      - { step: 5, header: "6C 18 F1", request: "03", target: "TCM only — true transmission DTCs" }
      - { step: 6, header: "6C 40 F1", request: "03", target: "BCM — body DTCs" }
      - { step: 7, header: "6C 28 F1", request: "03", target: "ABS — brake DTCs" }

# ──────────────────────────────────────────────────────────────────────────────
# 20. KNOWN PLATFORM ISSUES & DIAGNOSTIC WISDOM
# ──────────────────────────────────────────────────────────────────────────────

known_issues:
  description: "Common LLY failure modes and diagnostic shortcuts"
  confidence: community
  sources: [GM-TSB-LLY, OFI-DMAX-DIAG, DMAX-BALANCE-RATES-PISTONTWISTIN, DMAX-BALANCE-RATES-INJECTORSDIRECT]

  turbo_vane_sticking:
    rank: 1
    symptoms: ["P0234", "P0299", "Reduced Engine Power", "Black smoke at WOT", "Sluggish acceleration"]
    root_cause: "Carbon/soot buildup in VGT unison ring restricts vane movement"
    quick_test: "Monitor VGT Position Error (22 11 9C). Error > 10% under load = sticking."
    fix: "Remove turbo, clean/replace unison ring. Upgraded stainless ring available aftermarket."

  ficm_failure:
    rank: 2
    symptoms: ["P0201-P0208", "P0611", "P2146", "P2149", "Hard start", "Rough idle", "Missing at cold start"]
    root_cause: "Internal capacitor bank failure in FICM — 48V drops below threshold"
    quick_test: "Monitor FICM voltage (22 11 00 at node 0x11, or bench test at C1-15/C1-1). <47V = marginal, <45V = failed."
    fix: "Replace FICM or send for rebuild (Alliant Power, Dorman). Aftermarket upgraded FICMs available."

  injector_failure:
    rank: 3
    symptoms: ["Balance rate > ±4 mm3", "White smoke at cold start", "Excessive fuel consumption", "Rough idle"]
    root_cause: "Injector nozzle wear or internal seal failure"
    quick_test: "Read balance rates (22 19 86-8D at node 0x10) at warm idle. Values > ±4 = failing injector."
    fix: "Replace individual injectors. LLY uses Bosch CRIN2 — verify FICM is good first."
    warning: "ALWAYS verify FICM 48V before condemning injectors. Low FICM voltage mimics bad injectors."

  head_gasket:
    rank: 4
    symptoms: ["Coolant loss without external leak", "White exhaust (coolant steam)", "Coolant in oil", "Overheating"]
    root_cause: "Head gasket failure between cylinder and coolant passage. LLY head bolts stretch — TTY design."
    quick_test: "Watch coolant temp (01 05) for rapid spikes under load. Check oil for milky appearance."
    fix: "Head gasket replacement. Upgraded ARP head studs strongly recommended."

  egr_cooler:
    rank: 5
    symptoms: ["P0401", "White smoke at idle", "Coolant loss into intake", "Rough idle"]
    root_cause: "EGR cooler internal rupture — exhaust pressure pushes coolant into intake"
    quick_test: "Remove intake pipe and look for coolant pooling. Monitor EGR position error (22 11 97)."
    fix: "Replace EGR cooler. Many owners delete EGR (not emissions legal in all states)."

  water_in_fuel_sensor:
    rank: 6
    symptoms: ["Water in Fuel warning lamp", "P0169 (Water in Fuel)"]
    root_cause: "Sensor in fuel filter housing triggers on water contamination OR sensor failure"
    quick_test: "Drain fuel filter water separator. If warning persists after drain = bad sensor."
    fix: "Drain water separator. Replace sensor if faulty. Always use good fuel filters."

