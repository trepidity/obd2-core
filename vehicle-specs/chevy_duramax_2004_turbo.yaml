# 16. NETWORK COMMUNICATION DTCs (U-Codes)
# ──────────────────────────────────────────────────────────────────────────────

network_dtc_library:
  description: "Communication fault codes — indicate lost messages between modules on J1850 VPW bus"
  confidence: verified
  sources: [SAE-J2012, GM-ACDELCO-TDS]
  codes:
    - { id: "U0001", meaning: "High Speed CAN Communication Bus", severity: "critical", note: "CAN bus fault (internal powertrain bus, not OBD-II DLC)" }
