    - pid: "12 22"
      name: "Yaw Rate"
      bytes: 2
      formula: "signed_int(A,B) / 100"
      unit: "°/s"

# ──────────────────────────────────────────────────────────────────────────────
# 13. IPC (Instrument Panel Cluster)
# ──────────────────────────────────────────────────────────────────────────────

ipc_pids:
  header: "6C 20 F1"
  request_prefix: "22"
  response_prefix: "62"
  description: "Instrument cluster — gauges, warning lamps, trip data"
  confidence: unverified
  sources: [GM-ACDELCO-TDS]
  source_note: "IPC PID addresses are UNVERIFIED. Need Tech2 confirmation."

  pids:
    - pid: "14 00"
      name: "Displayed Vehicle Speed"
      bytes: 2
      formula: "(A * 256) + B"
      unit: "km/h"

    - pid: "14 01"
      name: "Displayed Engine RPM"
      bytes: 2
      formula: "(A * 256) + B"
      unit: "RPM"
      note: "This is what the tach needle shows, may have filtering/damping."

    - pid: "14 10"
      name: "Warning Lamp Status"
      bytes: 2
      type: "Bitmask"
      decoding:
        bit0: "MIL (Check Engine)"
        bit1: "Oil pressure warning"
        bit2: "Coolant temperature warning"
        bit3: "Battery/charging"
        bit4: "ABS"
        bit5: "Airbag"
        bit6: "Security"
        bit7: "Reduced power"
        bit8: "Transmission temp"
        bit9: "Water in fuel"
        bit10: "Glow plug / wait to start"
        bit11: "Cruise control indicator"

    - pid: "14 20"
      name: "Fuel Level (displayed)"
      bytes: 1
      formula: "(A * 100) / 255"
      unit: "%"

    - pid: "14 21"
      name: "Oil Life Remaining"
      bytes: 1
      formula: "(A * 100) / 255"
      unit: "%"
      range: { fresh: "90-100", change_soon: "10-20", change_now: "0" }

    - pid: "14 30"
      name: "Trip Odometer"
      bytes: 4
      formula: "((A * 16777216) + (B * 65536) + (C * 256) + D) / 10"
      unit: "km"

# ──────────────────────────────────────────────────────────────────────────────
# 14. ECM DTC LIBRARY (Duramax LLY Specific)
# ──────────────────────────────────────────────────────────────────────────────

ecm_dtc_library:
  node: "0x10"
  description: "ECM DTCs for Bosch E60 / Duramax LLY. Retrieved via Mode 03, 07, 0A, or Mode 19."
  confidence: verified
  sources: [SAE-J2012, GM-ACDELCO-TDS, GM-TSB-LLY, OFI-DMAX-DIAG]
  source_note: "Generic P0xxx codes are defined by SAE J2012. GM-specific codes (P1xxx, upper P2xxx) from ACDelco TDS. Severity ratings and diagnostic notes from community experience."

  fuel_system:
    - { id: "P0087", meaning: "Fuel Rail/System Pressure Too Low", severity: "critical", note: "CP3 pump failure, fuel filter, air in lines, injector return leak" }
    - { id: "P0088", meaning: "Fuel Rail/System Pressure Too High", severity: "high", note: "FRP regulator stuck or sensor fault" }
    - { id: "P0089", meaning: "Fuel Pressure Regulator Performance", severity: "high" }
    - { id: "P0093", meaning: "Fuel System Leak Detected (Large)", severity: "critical", note: "Injector return line leak or cracked high-pressure line — DO NOT RUN ENGINE" }
    - { id: "P0094", meaning: "Fuel System Leak Detected (Small)", severity: "high" }
    - { id: "P0191", meaning: "Fuel Rail Pressure Sensor Circuit Range/Performance", severity: "medium" }
